<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jim's Publishing System — Project Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e0;
    --text2: #888880;
    --text3: #555550;
    --accent: #c8f060;
    --accent2: #a8d040;
    --energy: #f0a040;
    --antennas: #40c8f0;
    --electrical: #c040f0;
    --meta: #e85080;
    --infra: #60d0a0;
    --done-bg: #1a1f14;
    --done-text: #4a5a30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  @media (min-width: 600px) {
    body { padding: 40px 24px; }
  }

  .header {
    max-width: 860px;
    margin: 0 auto 48px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .header-left p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
    font-weight: 300;
  }

  .deadline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 16px;
    text-align: right;
    flex-shrink: 0;
  }

  .deadline .date {
    color: var(--meta);
    font-size: 16px;
    font-weight: 500;
    display: block;
  }

  .deadline .label {
    color: var(--text3);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-bar-wrap {
    max-width: 860px;
    margin: 0 auto 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
  }

  .filters {
    max-width: 860px;
    margin: 0 auto 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }

  .phase {
    max-width: 860px;
    margin: 0 auto 32px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .phase-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .phase-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .phase-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .phase-deadline {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 3px;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .task:hover { border-color: var(--border2); background: var(--surface2); }

  .task.done {
    background: var(--done-bg);
    border-color: #222;
  }

  .task.done .task-text {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: #3a4a28;
  }

  .task.done .task-meta { color: #2a3a20; }

  .checkbox {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .task.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task.done .checkbox::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 2px solid #0f0f0f;
    border-bottom: 2px solid #0f0f0f;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    font-weight: 400;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .div-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
  }

  .div-energy { background: #2a1f0a; color: var(--energy); }
  .div-antennas { background: #0a1f2a; color: var(--antennas); }
  .div-electrical { background: #1f0a2a; color: var(--electrical); }
  .div-meta { background: #2a0a1a; color: var(--meta); }
  .div-infra { background: #0a1f18; color: var(--infra); }
  .div-all { background: #1f1f14; color: var(--accent); }

  .priority-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.5px;
  }

  .blocker-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--meta);
    background: #2a0a1a;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .hidden { display: none !important; }

  .empty-state {
    max-width: 860px;
    margin: 0 auto;
    text-align: center;
    padding: 48px;
    color: var(--text3);
    font-size: 13px;
  }

  .stats-row {
    max-width: 860px;
    margin: 0 auto 40px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 3px;
    display: block;
  }
</style>
</head>
<body>

<div class="header">

  </div>

  </div>

  <div class="stat">

<div class="filters">

<div id="checklist"></div>

      { id: 'k7', text: 'Gather all franchisee GBP location IDs for Electrical division', divs: ['electrical','infra'], priority: 'high' },
      { id: 'k8', text: 'Start franchisee lookup table in SharePoint (Division | Franchisee | GBP ID | FB Page ID | IG User ID)', divs: ['infra'], priority: 'high' },
      { id: 'k9', text: 'Gather Facebook Page IDs for all Antennas franchisees', divs: ['antennas','meta'], priority: 'high' },

      { id: 'm2', text: 'Refine Electrical Claude prompt against existing posts', divs: ['electrical'], priority: 'high' },

      { id: 'm4', text: 'Finalise Antennas APITemplate template — sign off on branded image quality', divs: ['antennas'], priority: 'high' },

    tasks: [
      { id: 'r1', text: 'Roll Electrical live — all platforms', divs: ['electrical'], priority: 'critical' },
      { id: 'r2', text: 'Roll Energy live up to Teams approval (GBP posts when verification clears)', divs: ['energy'], priority: 'critical' },
      { id: 'r3', text: 'Live test Energy Facebook + Instagram posts', divs: ['energy','meta'], priority: 'critical' },

    tasks: [
      { id: 'o1', text: 'Energy GBP posts live once all locations verified', divs: ['energy'], priority: 'medium', blocker: true },
      { id: 'o2', text: 'Build solar+battery APITemplate template for Energy', divs: ['energy'], priority: 'medium' },
      { id: 'o3', text: 'Build battery-only APITemplate template for Energy', divs: ['energy'], priority: 'medium' },
      { id: 'o4', text: 'Add SEO tags and social_caption fields to Claude JSON output', divs: ['all'], priority: 'low' },
      { id: 'o5', text: 'Review Meta posting analytics — refine Claude prompts based on engagement', divs: ['meta'], priority: 'low' },

let activeFilter = 'all';
let taskState = {};

function getStorageKey() { return 'jims_checklist_v1'; }

function loadState() {
  try {
    const saved = localStorage.getItem(getStorageKey());
    if (saved) taskState = JSON.parse(saved);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(getStorageKey(), JSON.stringify(taskState)); } catch(e) {}
}

function toggleTask(id) {
  taskState[id] = !taskState[id];
  saveState();
  render();
}

function filterTasks(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function taskMatchesFilter(task) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'pending') return !taskState[task.id];
  if (activeFilter === 'blocker') return !!task.blocker;
  return task.divs.includes(activeFilter);
}

function render() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  let totalTasks = 0, doneTasks = 0, blockerTotal = 0, weekendTotal = 0;

  phases.forEach(phase => {
    const visibleTasks = phase.tasks.filter(taskMatchesFilter);
    if (visibleTasks.length === 0) return;

    const phaseDiv = document.createElement('div');
    phaseDiv.className = 'phase';

    const phaseDone = phase.tasks.filter(t => taskState[t.id]).length;
    totalTasks += phase.tasks.length;
    doneTasks += phaseDone;
    blockerTotal += phase.tasks.filter(t => t.blocker).length;
    if (phase.id === 'weekend') weekendTotal += phase.tasks.filter(t => !taskState[t.id]).length;

    phaseDiv.innerHTML = `
      <div class="phase-header">
        <span class="phase-tag" style="background:${phase.tagBg};color:${phase.tagColor}">${phase.tag}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-count">${phaseDone}/${phase.tasks.length}</span>
        <span class="phase-deadline">${phase.deadline}</span>
      </div>
    `;

    visibleTasks.forEach(task => {
      const done = !!taskState[task.id];
      const taskEl = document.createElement('div');
      taskEl.className = `task${done ? ' done' : ''}`;
      taskEl.onclick = () => toggleTask(task.id);

      const divTags = task.divs.map(d => `<span class="div-tag div-${d}">${d}</span>`).join('');
      const blockerTag = task.blocker ? '<span class="blocker-tag">⚡ blocker</span>' : '';
      const priorityTag = task.priority === 'critical' ? '<span class="priority-tag">critical</span>' : '';

      taskEl.innerHTML = `
        <div class="checkbox"></div>
        <div class="task-body">
          <div class="task-text">${task.text}</div>
          <div class="task-meta">${divTags}${blockerTag}${priorityTag}</div>
        </div>
      `;
      phaseDiv.appendChild(taskEl);
    });

    container.appendChild(phaseDiv);
  });

  const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${doneTasks} / ${totalTasks} complete — ${pct}%`;
  document.getElementById('stat-done').textContent = doneTasks;
  document.getElementById('stat-remaining').textContent = totalTasks - doneTasks;
  document.getElementById('stat-blockers').textContent = blockerTotal;
  document.getElementById('stat-this-week').textContent = weekendTotal;
  document.getElementById('stat-phases').textContent = phases.length;
}

loadState();
render();
</script>
</body>
</html>
